<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeStock | Etiquetas</title>

<style>
:root {
  --azul-marinho: #07182c;
  --cinza: #5f6b7c;
  --azul-principal: #2f7be5;
  --branco: #f7f7f7;
  --verde: #168575;
  --vermelho: #f25a4b;
  --borda: #d8e2f0;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: var(--branco);
}

/* LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  background: var(--azul-marinho);
  color: white;
  padding: 20px;
}

.sidebar img {
  width: 150px;
  margin-bottom: 30px;
}

.menu a {
  display: block;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: #a9bdd8;
  margin-bottom: 8px;
  font-weight: bold;
  transition: .3s;
}

.menu a:hover,
.menu a.active {
  background: var(--azul-principal);
  color: white;
}

/* MAIN */
.main {
  padding: 30px;
}

h1 {
  margin-bottom: 20px;
}

/* CARD */
.card {
  background: white;
  border: 1px solid var(--borda);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

/* FORM */
.form {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.form input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--borda);
}

.btn {
  grid-column: span 2;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: var(--azul-principal);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: .3s;
}

.btn:hover {
  background: var(--azul-marinho);
}

/* QR PREVIEW */
.qr-box {
  margin-top: 20px;
  text-align: center;
}

.qr {
  width: 120px;
  height: 120px;
  margin: auto;
  background:
    linear-gradient(90deg, black 6px, transparent 6px) 0 0/18px 18px,
    linear-gradient(black 6px, transparent 6px) 0 0/18px 18px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
}

th {
  color: var(--cinza);
  font-size: 12px;
}

/* TAG */
.tag {
  padding: 6px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: bold;
}

.ok { background: #e0f7f3; color: var(--verde); }
.print { background: #eaf2ff; color: var(--azul-principal); }

/* BOTÃO AÇÃO */
.action-btn {
  padding: 8px 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.print-btn {
  background: var(--azul-principal);
  color: white;
}

.print-btn:hover {
  background: var(--azul-marinho);
}

</style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <img src="logo.png">

    <nav class="menu">
      <a href="home.html">Home</a>
      <a href="cadastro-material.html">Cadastrar</a>
      <a href="materiais.html">Materiais</a>
      <a href="etiquetas.html" class="active">Etiquetas</a>
      <a href="movimentacoes.html">Movimentações</a>
      <a href="login.html">Sair</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <h1>Gerar Etiquetas QR Code</h1>

    <!-- GERADOR -->
    <div class="card">
      <h3>Nova etiqueta</h3>

      <div class="form">
        <input placeholder="Código do material">
        <input placeholder="Lote">
        <input placeholder="Quantidade">
        <input placeholder="Localização">

        <button class="btn" onclick="gerarQR()">Gerar etiqueta</button>
      </div>

      <div class="qr-box">
        <div class="qr" id="qr"></div>
        <p style="margin-top:10px;color:gray;">Preview do QR Code</p>
      </div>
    </div>

    <!-- LISTA -->
    <div class="card">
      <h3>Etiquetas geradas</h3>

      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Lote</th>
            <th>Status</th>
            <th>Ação</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>MP-1024</td>
            <td>L2408</td>
            <td><span class="tag ok">Ativa</span></td>
            <td><button class="action-btn print-btn">Imprimir</button></td>
          </tr>

          <tr>
            <td>MP-2077</td>
            <td>C7731</td>
            <td><span class="tag print">Gerada</span></td>
            <td><button class="action-btn print-btn">Imprimir</button></td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script>
function gerarQR() {
  const qr = document.getElementById("qr");

  qr.style.animation = "pulse 0.4s ease";
  setTimeout(() => qr.style.animation = "", 400);
}
</script>

</body>
</html>
